<!DOCTYPE html>
<html>
<head>
    <title>Step Tracker</title> <!-- заголовок вкладки -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- адаптация под телефон -->

    <style>
        body {
            font-family: Arial, sans-serif; /* шрифт */
            margin: 0; /* убираем отступы */
            padding: 20px; /* внутренние отступы */
            background: #0f172a; /* тёмный фон */
            color: white; /* белый текст */
            text-align: center; /* центрируем всё */
        }

        .top-bar {
            display: flex; /* делаем строку */
            justify-content: space-between; /* раздвигаем по краям */
            align-items: center; /* выравниваем по вертикали */
            margin-bottom: 15px; /* отступ снизу */
        }

        a {
            color: #38bdf8; /* цвет ссылок */
            text-decoration: none; /* убираем подчёркивание */
        }

        .grid {
            display: grid; /* сетка */
            grid-template-columns: repeat(10, 1fr); /* 10 колонок */
            gap: 5px; /* расстояние между клетками */
            max-width: 350px; /* ограничение ширины */
            margin: 20px auto; /* центрирование */
        }

        .cell {
            width: 100%; /* ширина клетки */
            aspect-ratio: 1; /* квадрат */
            background: #1e293b; /* серый цвет */
            border-radius: 6px; /* скругление */
        }

        .cell.active {
            background: #22c55e; /* зелёный если активен */
        }

        button {
            font-size: 18px; /* размер текста */
            padding: 14px; /* внутренний отступ */
            margin-top: 15px; /* отступ сверху */
            border: none; /* убираем рамку */
            border-radius: 12px; /* скругление */
            width: 90%; /* ширина */
            max-width: 300px; /* максимум */
        }

        .step-btn {
            background: #22c55e; /* зелёная кнопка */
            color: white; /* белый текст */
        }

        .reset-btn {
            background: #ef4444; /* красная кнопка */
            color: white; /* белый текст */
        }

        button:active {
            transform: scale(0.98); /* эффект нажатия */
        }
        .cell {
            position: relative; /* чтобы рыцарь мог позиционироваться внутри клетки */
        }

        .player {
            position: absolute; /* фиксируем внутри клетки */
            top: 50%; /* по вертикали центр */
            left: 50%; /* по горизонтали центр */
            transform: translate(-50%, -50%); /* идеальное центрирование */
            font-size: 14px; /* размер рыцаря */
        }
    </style>
</head>

<body>

    <!-- верхняя панель -->
    <div class="top-bar">
        <div>🔥 Step Tracker</div> <!-- название -->
        <div>
            <a href="/logout">Logout</a> <!-- кнопка выхода -->
        </div>
    </div>

    <!-- сетка -->
    <div class="grid">
    {% for i in range(1, 101) %}
        <div class="cell {% if i <= progress %}active{% endif %}" data-index="{{ i }}">
            {% if i == progress %}
                <div class="player">🗡️</div>
            {% endif %}
        </div>
    {% endfor %}
    </div>

    <!-- кнопка +1 -->
    <form method="POST" action="/step">
        <button class="step-btn" type="submit">+1 Step</button>
    </form>

    <!-- кнопка reset -->
    <form method="POST" action="/reset">
        <button class="reset-btn" type="submit">Reset Progress</button>
    </form>

</body>
</html>
