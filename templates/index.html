<!DOCTYPE html>
<html>
<head>
    <title>Step Grid</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 15px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(10, 1fr);
            gap: 5px;
            max-width: 350px;
            margin: 20px auto;
        }

        .cell {
            width: 100%;
            aspect-ratio: 1;
            background: #1e293b;
            border-radius: 6px;
        }

        .cell.active {
            background: #22c55e;
        }

        button {
            font-size: 18px;
            padding: 14px;
            margin-top: 15px;
            border: none;
            border-radius: 12px;
            width: 90%;
            max-width: 300px;
        }

        .step-btn {
            background: #22c55e;
            color: white;
        }

        .reset-btn {
            background: #ef4444;
            color: white;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>

<body>

    <h1>🔥 Step Tracker Grid</h1>

    <div class="grid">
        {% for i in range(1, 101) %}
            <div class="cell {% if i <= progress %}active{% endif %}"></div>
        {% endfor %}
    </div>

    <form method="POST" action="/step">
        <button class="step-btn" type="submit">+1 Step</button>
    </form>

    <form method="POST" action="/reset">
        <button class="reset-btn" type="submit">Reset Progress</button>
    </form>

</body>
</html>
